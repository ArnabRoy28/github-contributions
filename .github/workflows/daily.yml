cat > .github/workflows/daily.yml << 'EOF'
name: Daily Commit

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Daily commit
        run: |
          echo "$(date)" >> activity.txt
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Daily update" || exit 0
          git push
EOF
